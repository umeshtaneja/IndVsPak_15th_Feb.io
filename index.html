<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>India vs Pak 🇮🇳🇵🇰</title>

<style>
  body {
    height: 100vh;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #7a0000, #c1121f);
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
  }

  .card {
    background: rgba(0,0,0,0.6);
    padding: 40px;
    border-radius: 16px;
    text-align: center;
    z-index: 2;
  }

  #yes {
    padding: 12px 28px;
    font-size: 18px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    background: #22c55e;
    font-weight: bold;
  }

  /* NO button image */
  #no {
    position: absolute;
    background: #ef4444;
    border: none;
    padding: 0;
    cursor: pointer;
    z-index: 10;
  }

  #no img {
    width: 90px;
    pointer-events: none; /* 🔥 KEY FIX */
  }

  /* Dialog */
  .dialog {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 5;
  }

  .dialog-box {
    background: #020617;
    padding: 30px;
    border-radius: 12px;
    text-align: center;
  }

  /* Jet */
  .jet {
    position: fixed;
    top: 40%;
    left: -200px;
    width: 160px;
    display: none;
    z-index: 3;
    animation: fly 1.6s linear forwards;
  }

  @keyframes fly {
    from { left: -200px; }
    to { left: 110%; }
  }
</style>
</head>

<body>

<div class="card">
  <h1>Will Pakistan play on 15th Feb? 🇮🇳🇵🇰</h1>
  <button id="yes">YES</button>
</div>

<button id="no">
  <img src="pak-flag.png" alt="NO">
</button>

<div class="dialog" id="dialog">
  <div class="dialog-box">
    <h2>Of course 😄</h2>
    <p>Jet has taken off ✈️</p>
    <button onclick="closeDialog()">Close</button>
  </div>
</div>

<img src="jet.png" class="jet" id="jet">

<audio id="jetSound" src="jet.mp3"></audio>

<script>
  const noBtn = document.getElementById("no");
  const yesBtn = document.getElementById("yes");
  const jetSound = document.getElementById("jetSound");
  const dialog = document.getElementById("dialog");
  const jet = document.getElementById("jet");

  // 🚫 NO runs away
  noBtn.addEventListener("mouseenter", () => {
    const x = Math.random() * (window.innerWidth - 120);
    const y = Math.random() * (window.innerHeight - 120);
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
  });

  // YES click
  yesBtn.addEventListener("click", () => {
    dialog.style.display = "flex";

    jet.style.display = "block";
    jet.style.animation = "none";
    jet.offsetHeight;
    jet.style.animation = "fly 1.6s linear forwards";

    jetSound.currentTime = 0;
    jetSound.play();

    if (navigator.vibrate) {
      navigator.vibrate([200, 100, 200]);
    }
  });

  function closeDialog() {
    dialog.style.display = "none";
  }
</script>

</body>
</html>
