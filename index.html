<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>India vs Pak 🇮🇳🇵🇰</title>

  <style>
    body {
      height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #7a0000, #c1121f);
      font-family: Arial, sans-serif;
      color: white;
      overflow: hidden;
      cursor: url("jet.png"), auto;
    }

    .card {
      text-align: center;
      background: rgba(0,0,0,0.5);
      padding: 40px;
      border-radius: 16px;
      z-index: 2;
    }

    button {
      padding: 12px 28px;
      font-size: 18px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      margin: 10px;
    }

    #yes {
      background: #22c55e;
      color: black;
    }

    #no {
      background: #ef4444;
      color: white;
      position: absolute;
    }

    /* Dialog */
    .dialog {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 5;
    }

    .dialog-box {
      background: #020617;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
    }

    /* Jet animation */
    .jet {
      position: fixed;
      top: 40%;
      left: -200px;
      width: 150px;
      display: none;
      z-index: 3;
      animation: fly 1.8s linear forwards;
    }

    @keyframes fly {
      from {
        left: -200px;
        transform: scale(0.8);
      }
      to {
        left: 110%;
        transform: scale(1.2);
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Will Pakistan play on 15th Feb? 🇮🇳🇵🇰</h1>
    <button id="yes">YES</button>
  </div>

  <button id="no">NO</button>

  <!-- Dialog -->
  <div class="dialog" id="dialog">
    <div class="dialog-box">
      <h2>Of course 😄</h2>
      <p>Jet has taken off ✈️</p>
      <button onclick="closeDialog()">Close</button>
    </div>
  </div>

  <!-- Jet -->
  <img src="jet.png" class="jet" id="jet" />

  <!-- Audio -->
  <audio id="jetSound" src="jet.mp3" preload="auto"></audio>

  <script>
    const noBtn = document.getElementById("no");
    const yesBtn = document.getElementById("yes");
    const dialog = document.getElementById("dialog");
    const jet = document.getElementById("jet");
    const jetSound = document.getElementById("jetSound");

    // NO button movement
    noBtn.addEventListener("mouseover", () => {
      noBtn.style.left = Math.random() * (window.innerWidth - 100) + "px";
      noBtn.style.top = Math.random() * (window.innerHeight - 50) + "px";
    });

    // YES click
    yesBtn.addEventListener("click", async () => {
      // Show dialog
      dialog.style.display = "flex";

      // Jet animation
      jet.style.display = "block";
      jet.style.animation = "none";
      jet.offsetHeight; // reflow
      jet.style.animation = "fly 1.8s linear forwards";

      // Play sound (important)
      try {
        jetSound.currentTime = 0;
        await jetSound.play();
      } catch (e) {
        console.log("Sound blocked:", e);
      }

      // Mobile vibration
      if (navigator.vibrate) {
        navigator.vibrate([200, 100, 200]);
      }
    });

    function closeDialog() {
      dialog.style.display = "none";
    }
  </script>

</body>
</html>
