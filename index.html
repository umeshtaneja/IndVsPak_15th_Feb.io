<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>India vs Pak – 15 Feb</title>

  <style>
    body {
      height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #8b0000, #ff2400);
      font-family: Arial, sans-serif;
      color: white;
      overflow: hidden;
    }

    .card {
      text-align: center;
      background: rgba(0, 0, 0, 0.65);
      padding: 40px;
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      z-index: 2;
    }

    h1 {
      margin-bottom: 30px;
    }

    button {
      padding: 14px 32px;
      font-size: 20px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      margin: 10px;
    }

    #yes {
      background: #22c55e;
      color: black;
      font-weight: bold;
    }

    /* NO image */
    #no {
      width: 90px;
      position: absolute;
      cursor: pointer;
      transition: transform 0.15s ease;
      z-index: 2;
    }

    /* Modal overlay */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    .modal {
      background: #020617;
      padding: 35px 40px;
      border-radius: 16px;
      text-align: center;
      animation: pop 0.3s ease;
      box-shadow: 0 30px 80px rgba(0,0,0,0.7);
    }

    .modal h2 {
      margin-bottom: 20px;
    }

    .modal button {
      background: #22c55e;
      color: black;
      font-weight: bold;
    }

    @keyframes pop {
      from {
        transform: scale(0.7);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Will Pakistan play on 15th Feb? 🇮🇳🇵🇰</h1>
    <button id="yes">YES</button>
  </div>

  <!-- NO image -->
  <img
    id="no"
    src="https://upload.wikimedia.org/wikipedia/commons/3/32/Flag_of_Pakistan.svg"
    alt="NO"
  />

  <!-- Modal -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <h2>Of course 😄🇮🇳</h2>
      <p>See you on 15th Feb 🏏🔥</p>
      <button onclick="closeModal()">OK</button>
    </div>
  </div>

  <!-- Jet sound -->
  <audio id="jetSound" preload="auto">
    <source src="https://assets.mixkit.co/sfx/preview/mixkit-fast-rocket-whoosh-1714.mp3" type="audio/mpeg">
  </audio>

  <script>
    const no = document.getElementById("no");
    const yes = document.getElementById("yes");
    const jetSound = document.getElementById("jetSound");
    const overlay = document.getElementById("overlay");

    // NO runs away
    no.addEventListener("mouseover", () => {
      const x = Math.random() * (window.innerWidth - 120);
      const y = Math.random() * (window.innerHeight - 120);
      no.style.left = x + "px";
      no.style.top = y + "px";
      no.style.transform = "rotate(" + (Math.random() * 360) + "deg)";
    });

    // YES click
    yes.addEventListener("click", () => {
      jetSound.currentTime = 0;
      jetSound.play();
      overlay.style.display = "flex";
    });

    function closeModal() {
      overlay.style.display = "none";
    }

    // Initial NO position
    no.style.left = "60%";
    no.style.top = "70%";
  </script>

</body>
</html>
